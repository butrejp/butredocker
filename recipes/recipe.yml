# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: butredocker
description: My optimized Fedora CoreOS image for running Docker and Fluxer on a Wyse 3040.

base-image: quay.io/fedora/fedora-coreos
image-version: 44

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      files:
        - https://download.docker.com/linux/fedora/docker-ce.repo
        - https://pkg.cloudflare.com/cloudflared.repo
    install:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
      - cloudflared
      - git
      - zram-generator
    remove:
      - podman
      - podman-docker
      - skopeo
  
  - type: systemd
    system:
      enabled:
        - docker
        - cloudflared

  - type: signing
